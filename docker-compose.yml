services:
  app:
    build: .
    container_name: sitepat-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - sitepat
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: sitepat-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sitepat

  db:
    image: mysql:8.0
    container_name: sitepat-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sitepat_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: db_password
      MYSQL_USER: sitepat_user
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sitepat

  redis:
    image: redis:alpine
    container_name: sitepat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sitepat

volumes:
  mysql_data:
    driver: local

networks:
  sitepat:
    driver: bridge
